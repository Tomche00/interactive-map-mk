<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Pin shadow -->
  <ellipse cx="16" cy="28" rx="4" ry="2" fill="#000" opacity="0.25"/>
  
  <!-- Main pin body -->
  <path d="M16 3C10.48 3 6 7.48 6 13c0 6.5 10 15 10 15s10-8.5 10-15c0-5.52-4.48-10-10-10z" 
        fill="url(#pinGradient)" 
        filter="url(#shadow)"/>
  
  <!-- Inner circle -->
  <circle cx="16" cy="13" r="4" fill="#ffffff" opacity="0.95"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="13" r="2" fill="#1a73e8"/>
  
  <!-- Highlight/shine effect -->
  <path d="M16 3C12.5 3 9.5 5 8 8c1-0.5 3-1 5-1s4 0.5 5 1C22.5 5 19.5 3 16 3z" 
        fill="#ffffff" 
        opacity="0.4"/>
  
  <!-- Bottom point highlight -->
  <path d="M16 28c-2 0-3-1-4-2l4-5 4 5c-1 1-2 2-4 2z" 
        fill="#ffffff" 
        opacity="0.2"/>
</svg>
