<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Pin shadow -->
  <ellipse cx="12" cy="20.5" rx="3" ry="1.5" fill="#000" opacity="0.2"/>
  
  <!-- Main pin body -->
  <path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 8 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8z" 
        fill="url(#pinGradient)" 
        filter="url(#shadow)"/>
  
  <!-- Inner circle -->
  <circle cx="12" cy="10" r="3" fill="#ffffff" opacity="0.9"/>
  
  <!-- Center dot -->
  <circle cx="12" cy="10" r="1.5" fill="#dc2626"/>
  
  <!-- Highlight -->
  <path d="M12 2C9.5 2 7.5 3.5 6.5 5.5c0.5-0.3 1.5-0.5 2.5-0.5s2 0.2 2.5 0.5C13 3.5 11 2 12 2z" 
        fill="#ffffff" 
        opacity="0.3"/>
</svg>
